<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="login-box">
    <h2 class="text-center mb-4">超市进销存管理系统</h2>
    <div id="alertBox"></div>
    <div class="mb-3">
        <label class="form-label">员工编号</label>
        <input type="text" class="form-control" id="eid" placeholder="请输入员工编号">
    </div>
    <div class="mb-3">
        <label class="form-label">密码</label>
        <input type="password" class="form-control" id="epas" placeholder="请输入密码">
    </div>
    <button class="btn btn-primary w-100" onclick="login()">登录</button>
</div>

<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script src="js/login.js"></script>
</body>
</html>
