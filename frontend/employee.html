<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>员工管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body onload="initPage()">
<div id="navbar"></div>
<div class="container page-container">
    <div id="alertBox"></div>

    <div class="card">
        <div class="card-header">员工信息录入 / 修改</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">员工编号</label>
                    <input type="text" class="form-control" id="eid">
                </div>
                <div class="col-md-3">
                    <label class="form-label">员工姓名</label>
                    <input type="text" class="form-control" id="ename">
                </div>
                <div class="col-md-3">
                    <label class="form-label">密码</label>
                    <input type="text" class="form-control" id="epas">
                </div>
                <div class="col-md-3">
                    <label class="form-label">级别</label>
                    <select class="form-select" id="elevel">
                        <option value="00">管理员</option>
                        <option value="10">主管</option>
                        <option value="20">采购员</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">电话</label>
                    <input type="text" class="form-control" id="etel_phone">
                </div>
                <div class="col-md-3">
                    <label class="form-label">工资</label>
                    <input type="number" class="form-control" id="esalary">
                </div>
                <div class="col-md-3">
                    <label class="form-label">备注</label>
                    <input type="text" class="form-control" id="other">
                </div>
            </div>
            <div class="mt-3">
                <button class="btn btn-success" onclick="addEmployee()">新增</button>
                <button class="btn btn-warning" onclick="updateEmployee()">修改</button>
                <button class="btn btn-danger" onclick="deleteEmployee()">删除</button>
                <button class="btn btn-secondary" onclick="loadEmployees()">刷新</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">查询</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="searchName" class="form-control" placeholder="按姓名模糊查询">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary" onclick="searchByName()">查询</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">员工列表</div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover" id="employeeTable">
                    <thead class="table-light">
                    <tr>
                        <th>员工编号</th>
                        <th>姓名</th>
                        <th>密码</th>
                        <th>级别</th>
                        <th>电话</th>
                        <th>工资</th>
                        <th>备注</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script src="js/employee.js"></script>
</body>
</html>
